{% extends "base.html" %}
{% block conteudo %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<div class="container mt-4">

<h2>Editar Produto</h2>
<a href="/admin" class="btn btn-secondary mb-3">Voltar</a>

{% if produto %}

<form method="POST">

<div class="mb-3">
<label>Nome</label>
<input type="text" name="nome" class="form-control" value="{{produto[1]}}" required>
</div>

<div class="mb-3">
<label>Categoria</label>
<input type="text" name="categoria" class="form-control" value="{{produto[2]}}" required>
</div>

<div class="mb-3">
<label>Quantidade</label>
<input type="number" name="quantidade" class="form-control" value="{{produto[3]}}" required>
</div>

<button class="btn btn-success">Salvar alterações</button>

</form>

{% else %}

<div class="alert alert-warning">
Produto não encontrado.
</div>

{% endif %}

</div>
{% endblock %}
